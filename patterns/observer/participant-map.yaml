  - sample/fixtures/invalid/malformed-release.json
  - sample/fixtures/invalid/invalid-prerelease-zero.json
  - sample/fixtures/invalid/invalid-prerelease-empty.json
  - sample/fixtures/invalid/impossible-published-date.json
  - sample/fixtures/invalid/impossible-published-time.json
