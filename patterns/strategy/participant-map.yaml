pattern: Strategy
pattern_id: strategy
participants:
  Context:
    role: Risk-Aware Code Review root Skill and RiskAwareCodeReview demo class
    behavior: Validates one request, applies the explicit risk policy or a directly addressed strategy, and delegates review through the common Strategy contract.
    paths:
      - sample/SKILL.md
      - sample/scripts/run_demo.py
      - sample/fixtures/valid/low-risk-review.json
  Strategy:
    role: risk-aware-code-review-v1 review contract
    behavior: Defines the exact request and result fields implemented by every review procedure.
    path: sample/references/review-strategy-contract.md
  ConcreteStrategy:
    role: Fast Scan and Deep Review child Skills and demo classes
    behavior: Each accepts the same validated request and returns the same result contract while applying a distinct deterministic rule set.
    implementations:
      - id: fast-scan
        path: sample/child-skills/fast-scan/SKILL.md
        demo_strategy_class: FastScanStrategy
      - id: deep-review
        path: sample/child-skills/deep-review/SKILL.md
        demo_strategy_class: DeepReviewStrategy
execution_context:
  Agent Host:
    responsibility: Activates the root or a separately addressed ConcreteStrategy Skill.
    evidence_status: not observable
    note: The constructive sample supplies no Agent Host integration evidence.
  Agent Runtime:
    responsibility: Interprets the activated Skill behavioral source.
    evidence_status: not observable
    note: The deterministic Python review is an oracle, not evidence of model interpretation.
implementation_paths:
  - sample/scripts/run_demo.py
  - sample/skillware.yaml
  - sample/references/review-strategy-contract.md
  - sample/fixtures/valid/low-risk-review.json
  - sample/fixtures/valid/security-sensitive-review.json
  - sample/fixtures/valid/file-threshold-review.json
  - sample/fixtures/invalid/malformed-request.json
  - sample/fixtures/invalid/unsupported-schema.json
  - sample/fixtures/invalid/invalid-security-sensitive.json
  - sample/fixtures/invalid/empty-files.json
  - sample/fixtures/invalid/unsafe-path.json
  - sample/fixtures/invalid/invalid-line.json
  - sample/fixtures/invalid/invalid-json.json
  - sample/expected/low-risk-review-result.json
  - sample/expected/security-sensitive-review-result.json
  - sample/expected/file-threshold-review-result.json
  - sample/expected/malformed-request-error.txt
  - sample/expected/unsupported-schema-error.txt
  - sample/expected/invalid-security-sensitive-error.txt
  - sample/expected/empty-files-error.txt
  - sample/expected/unsafe-path-error.txt
  - sample/expected/invalid-line-error.txt
  - sample/expected/invalid-json-error.txt
  - sample/expected/unknown-strategy-error.txt
  - sample/expected/non-utf8-request-error.txt
  - sample/tests/test_demo.py
misuse_path: misuse/SKILL.md
evidence_path: evidence/ui-ux-pro-max-frozen-case.md
