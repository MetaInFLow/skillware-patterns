pattern: Strategy
pattern_id: strategy
participants:
  Context:
    role: Risk-Aware Code Review root Skill, RiskAwareCodeReview demo class, and compact review function
    behavior: Validates a request, applies the policy or a directly addressed strategy, and delegates exactly once through the contract for that public surface without inspecting built-in procedure rules.
    paths:
      - sample/SKILL.md
      - sample/scripts/run_demo.py
      - sample/fixtures/valid/low-risk-review.json
  Strategy:
    role: risk-aware-code-review-v1 rich contract and separate compact plan-compatibility contract
    behavior: Defines the exact request and result fields implemented by each review procedure within its public surface; compact and rich objects are not cross-substitutable.
    path: sample/references/review-strategy-contract.md
  ConcreteStrategy:
    role: Fast Scan and Deep Review child Skills and demo classes
    behavior: The two built-in implementations accept the same validated rich request and return the same rich result contract while applying separately tested deterministic rule sets; injected replacements need only satisfy the shared Strategy contract.
    implementations:
      - id: fast-scan
        path: sample/child-skills/fast-scan/SKILL.md
        demo_strategy_class: FastScanStrategy
        compact_callable: fast_scan
      - id: deep-review
        path: sample/child-skills/deep-review/SKILL.md
        demo_strategy_class: DeepReviewStrategy
        compact_callable: deep_review
execution_context:
  Agent Host:
    responsibility: Activates the root or a separately addressed ConcreteStrategy Skill.
    evidence_status: not observable
    note: The constructive sample supplies no Agent Host integration evidence.
  Agent Runtime:
    responsibility: Interprets the activated Skill behavioral source.
    evidence_status: not observable
    note: The deterministic Python review is an oracle, not evidence of model interpretation.
implementation_paths:
