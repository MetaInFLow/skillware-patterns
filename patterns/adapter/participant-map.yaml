pattern: Adapter
pattern_id: adapter
participants:
  Client:
    role: Task caller
    behavior: Supplies one canonical issue, selects a tracker, and provides exact target context.
    path: sample/README.md
  Target:
    role: Documented tracker request contract
    behavior: Defines the versioned REST or GraphQL request descriptor for GitHub, Jira, or Linear.
    path: sample/references/tracker-contracts.md
  Adaptee:
    role: Canonical issue-publishing Skill
    behavior: Defines stable issue identity and semantics independently of any tracker.
    path: sample/SKILL.md
  Adapter:
    role: Thin target bindings
    behavior: Builds an offline Target request while preserving canonical identity and severity.
    implementations:
      - id: github
        operation: adapt_github
        path: sample/scripts/run_demo.py
      - id: jira
        operation: adapt_jira
        path: sample/scripts/run_demo.py
      - id: linear
        operation: adapt_linear
        path: sample/scripts/run_demo.py
execution_context:
  Agent Host:
    responsibility: Activates the Skillware Unit and may carry an Adapter binding.
    evidence_status: not observable
    note: A Host is not automatically a GoF participant; this sample has no Host integration evidence.
  Agent Runtime:
    responsibility: Interprets the activated behavioral source and binding instructions.
    evidence_status: not observable
    note: The deterministic demo is an oracle, not evidence of model interpretation.
implementation_paths:
