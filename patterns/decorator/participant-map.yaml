  - sample/fixtures/invalid/lone-surrogate.json
  - sample/fixtures/invalid/duplicate-root-member.json
  - sample/fixtures/invalid/duplicate-nested-member.json
  - sample/fixtures/invalid/excessive-depth.json
  - sample/expected/enhanced-contract-result.json
